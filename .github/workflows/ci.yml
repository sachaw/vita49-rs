---
name: ci
on:
  push:
  pull_request:
  schedule:
    # Run once a week on Sundays
    - cron: "0 22 * * 0"

env:
  CARGO_TERM_COLOR: always

# By default, only give actions read access.
permissions: read-all

jobs:
  build_and_test:
    name: Build and test
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - stable
          - beta
          - nightly
    steps:
      - name: Install test deps
        run: |
          # Add the official Wireshark PPA
          sudo add-apt-repository ppa:wireshark-dev/stable -y
          sudo apt-get update

          if ! apt-cache policy tshark | grep -q 'ppa.launchpadcontent.net'; then
            echo "::error::Wireshark PPA is not available — tshark would come from the default Ubuntu repo"
            exit 1
          fi

          # Pre-seed the Wireshark prompt to be non-interactive
          # Set to 'true' if you want non-root users to capture, 'false' otherwise
          echo "wireshark-common wireshark-common/install-setuid boolean true" | sudo debconf-set-selections

          # Install tshark for the integration tests and libpcap-dev for pcap_reader example.
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y tshark libpcap-dev
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install Rust
        uses: dtolnay/rust-toolchain@56f84321dbccf38fb67ce29ab63e4754056677e0
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy,rustfmt
      - name: Run build
        run: cargo build --all-features
      - name: Run tests
        run: cargo test --all-features
      - name: Run doc build
        run: cargo doc --all-features --no-deps
      - name: Run clippy
        run: cargo clippy --all-features -- -Dwarnings
      - name: Run rustfmt
        run: cargo fmt --check

  reuse:
    name: Reuse compliance
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: REUSE Compliance Check
        uses: fsfe/reuse-action@bb774aa972c2a89ff34781233d275075cbddf542

  commit_check:
    name: Commit check
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Conform
        run: >
          docker run
          --rm
          -v "$PWD:/src:ro,Z"
          -w /src
          ghcr.io/siderolabs/conform:v0.1.0-alpha.30
          enforce
          --base-branch=origin/main

  msrv:
    name: Check MSRV
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install Rust
        uses: dtolnay/rust-toolchain@56f84321dbccf38fb67ce29ab63e4754056677e0
        with:
          toolchain: 1.71.0
      - name: Run build
        run: |
          # To build with an older Rust toolchain, we have to
          # specify some compatible crate versions.
          cargo generate-lockfile
          cargo update -p fixed --precise 1.27.0
          cargo update -p half --precise 2.4.1
          cargo update -p proc-macro-crate --precise 3.3.0
          cargo update -p indexmap --precise 2.11.4
          cargo update -p az --precise 1.2.1
          cargo build --all-features --package vita49
